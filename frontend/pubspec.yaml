name: shg_portal
description: Sittilingi SHG Portal — offline-first tablet app for SOFA field workers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database — SQLite on Android/iOS, IndexedDB on web, same query code
  drift: ^2.18.0
  drift_flutter: ^0.2.0

  # Network
  connectivity_plus: ^6.0.3
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Secure storage for JWT token
  flutter_secure_storage: ^9.2.2

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
