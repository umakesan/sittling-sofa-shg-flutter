name: shg_portal
description: Sittilingi SHG Portal — offline-first tablet app for SOFA field workers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.3.0

  # Local database — SQLite on Android/iOS, IndexedDB on web, same query code
  drift: 2.19.0
  path: ^1.9.0
  path_provider: ^2.1.3
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24

  # Network
  connectivity_plus: ^6.0.3
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Secure storage for JWT token
  flutter_secure_storage: ^9.2.2

  # Utilities
  cupertino_icons: ^1.0.8
  uuid: ^4.4.0
  intl: ^0.18.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: 2.19.0
  build_runner: ^2.4.9

flutter:
  generate: true
  uses-material-design: true
